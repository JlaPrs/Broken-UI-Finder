<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 1280px;
  height: 800px;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #e8eef5;
  background-image: radial-gradient(circle, #c5d0de 1px, transparent 1px);
  background-size: 20px 20px;
}

.browser-window {
  width: 1100px;
  height: 680px;
  margin: 60px auto;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 25px 60px rgba(0,0,0,0.25), 0 8px 20px rgba(0,0,0,0.15);
  display: flex;
  flex-direction: column;
  position: relative;
}

.toolbar {
  height: 50px;
  background: #f0f0f0;
  border-bottom: 1px solid #d1d1d1;
  display: flex;
  align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
}
.traffic-lights { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
.tl { width: 13px; height: 13px; border-radius: 50%; }
.tl-red   { background: #ff5f57; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.15); }
.tl-yellow{ background: #febc2e; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); }
.tl-green { background: #28c840; box-shadow: inset 0 0 0 0.5px rgba(0,0,0,0.1); }
.toolbar-spacer { flex: 1; }
.address-bar {
  flex: 0 0 420px;
  height: 30px;
  background: white;
  border-radius: 6px;
  border: 1px solid #d1d1d1;
  display: flex;
  align-items: center;
  padding: 0 12px;
  gap: 6px;
  font-size: 12.5px;
  color: #333;
}
.address-bar .lock { color: #1a8a34; font-size: 11px; }
.address-bar .domain { font-weight: 500; color: #111; }
.toolbar-right { flex: 1; display: flex; justify-content: flex-end; align-items: center; gap: 6px; }
.toolbar-icon { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: #555; }
.toolbar-icon.ext-active { background: #eef2ff; outline: 2px solid #4f46e5; font-size: 14px; }

.viewport { flex: 1; position: relative; overflow: hidden; background: #fff; }

/* Wireframe page */
.page-nav {
  height: 52px;
  background: #1e293b;
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 32px;
}
.page-logo-block { width: 110px; height: 22px; background: rgba(255,255,255,0.15); border-radius: 4px; }
.page-nav-links { display: flex; gap: 20px; }
.page-nav-link { width: 60px; height: 9px; background: rgba(255,255,255,0.2); border-radius: 3px; }
.page-nav-right { margin-left: auto; display: flex; gap: 10px; }
.page-nav-btn { width: 80px; height: 26px; background: rgba(255,255,255,0.12); border-radius: 13px; }
.page-nav-btn-cta { width: 88px; height: 26px; background: rgba(99,102,241,0.7); border-radius: 13px; }

.page-hero {
  height: 270px;
  background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%);
  display: flex;
  align-items: center;
  padding: 0 48px;
  position: relative;
  overflow: visible;
}
.hero-text-area { display: flex; flex-direction: column; gap: 12px; flex: 0 0 380px; }
.hero-line-1 { width: 220px; height: 13px; background: #cbd5e1; border-radius: 4px; }
.hero-line-2 { width: 300px; height: 22px; background: #94a3b8; border-radius: 4px; }
.hero-line-3 { width: 260px; height: 22px; background: #94a3b8; border-radius: 4px; }
.hero-line-4 { width: 340px; height: 9px; background: #cbd5e1; border-radius: 3px; }
.hero-line-5 { width: 280px; height: 9px; background: #cbd5e1; border-radius: 3px; }
.hero-btn-row { display: flex; gap: 10px; margin-top: 4px; }
.hero-btn-block { width: 105px; height: 34px; background: #64748b; border-radius: 6px; }
.hero-btn-ghost { width: 105px; height: 34px; border: 2px solid #94a3b8; border-radius: 6px; }

/* Highlighted element in page — pink dashed outline */
.hero-image-block {
  position: absolute;
  right: 290px;
  top: 30px;
  width: 350px;
  height: 200px;
  background: linear-gradient(135deg, #dde4ee 0%, #c8d4e3 100%);
  border-radius: 10px;
  overflow: hidden;
  /* Pink dashed highlight border */
  outline: 2px dashed #ff0080;
  outline-offset: 4px;
  box-shadow: 0 0 0 6px rgba(255,0,128,0.08);
}
.hero-image-inner {
  width: 100%; height: 100%;
  background: repeating-linear-gradient(45deg, transparent, transparent 20px, rgba(148,163,184,0.15) 20px, rgba(148,163,184,0.15) 40px);
}

/* Floating pink badge above highlighted element */
.highlight-badge {
  position: absolute;
  right: 290px;
  top: 9px;
  background: #ff0080;
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  z-index: 10;
  box-shadow: 0 2px 8px rgba(255,0,128,0.4);
}

.page-content {
  background: #f8fafc;
  padding: 22px 30px;
  display: flex;
  gap: 14px;
}
.content-card {
  flex: 1;
  background: white;
  border-radius: 10px;
  border: 1px solid #e2e8f0;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card-icon-block { width: 32px; height: 32px; background: #e2e8f0; border-radius: 8px; }
.card-title-block { width: 80%; height: 10px; background: #cbd5e1; border-radius: 3px; }
.card-text-block { width: 100%; height: 8px; background: #e2e8f0; border-radius: 3px; }
.card-text-block.short { width: 70%; }
.card-link-block { width: 50%; height: 8px; background: #bfdbfe; border-radius: 3px; margin-top: 4px; }

/* Extension popup */
.popup-wrapper {
  position: absolute;
  top: 10px; right: 16px;
  z-index: 100;
  box-shadow: 0 20px 60px rgba(0,0,0,0.22), 0 4px 16px rgba(0,0,0,0.12);
  border-radius: 10px;
}
.popup {
  width: 465px;
  background: #f8f9fa;
  border-radius: 10px;
  border: 1px solid #e5e7eb;
  padding: 20px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
.popup-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
.popup-icon { width: 20px; height: 20px; }
.popup-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }

/* Tab nav */
.tab-nav {
  display: flex;
  background: #f3f4f6;
  border-radius: 8px;
  padding: 3px;
  gap: 3px;
  margin-bottom: 12px;
}
.tab {
  flex: 1;
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  color: #6b7280;
}
.tab.active { background: #1f2937; color: white; }
.tab-badge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 18px;
  height: 18px;
  padding: 0 5px;
  border-radius: 9px;
  font-size: 10px;
  font-weight: 600;
}
.tab.active .tab-badge { background: rgba(255,255,255,0.25); color: white; }
.tab:not(.active) .tab-badge { background: #1f2937; color: white; }

/* Check card */
.check-card {
  background: white;
  border: 1px solid #e5e7eb;
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 8px;
}
.card-header {
  display: flex;
  align-items: center;
  padding: 8px 12px;
  gap: 8px;
}
.card-header.found { background: #fff3cd; border-bottom: 1px solid #fde68a; }
.card-header-title { font-size: 12px; font-weight: 600; color: #1a1a1a; flex: 1; }
.check-pill {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  background: #1f2937;
  color: white;
  padding: 2px 7px;
  border-radius: 4px;
}
.card-count { font-size: 11px; color: #6b7280; }
.card-body { padding: 8px 12px; }

.col-headers {
  display: flex;
  padding: 4px 0 6px 0;
  border-bottom: 1px solid #f3f4f6;
  margin-bottom: 4px;
}
.col-label {
  font-size: 9px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #9ca3af;
}
.col-label.left { flex: 1; }
.col-label.right { width: 80px; text-align: right; }

.list-item {
  display: flex;
  align-items: center;
  padding: 5px 0;
  border-bottom: 1px solid #f9fafb;
  font-size: 11.5px;
  color: #374151;
}
.list-item:last-child { border-bottom: none; }
.item-title { flex: 1; }
.item-value { font-weight: 600; color: #1f2937; width: 80px; text-align: right; }

/* Expanded item */
.expanded-wrap {
  border: 1px solid #e5e7eb;
  border-radius: 6px;
  overflow: hidden;
  margin: 3px 0;
}
.expanded-header {
  display: flex;
  align-items: center;
  padding: 6px 8px;
  background: #f9fafb;
  border-bottom: 1px solid #e5e7eb;
  font-size: 11.5px;
  color: #374151;
}
.detail-rows { padding: 6px 8px; display: flex; flex-direction: column; gap: 4px; }
.detail-row { display: flex; font-size: 10.5px; }
.detail-label { color: #9ca3af; width: 90px; flex-shrink: 0; }
.detail-val { color: #374151; font-weight: 500; }
.action-btns { display: flex; gap: 6px; padding: 6px 8px; border-top: 1px solid #f3f4f6; }
.btn-highlight {
  flex: 1;
  padding: 5px 10px;
  background: #1e3a8a;
  color: white;
  border: none;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  text-align: center;
  /* Active/pressed state */
  box-shadow: inset 0 1px 3px rgba(0,0,0,0.25);
  outline: 2px solid #3b82f6;
  outline-offset: 1px;
}
.btn-copy {
  flex: 1;
  padding: 5px 10px;
  background: #f3f4f6;
  color: #374151;
  border: 1px solid #e5e7eb;
  border-radius: 5px;
  font-size: 11px;
  font-weight: 500;
  text-align: center;
}
</style>
</head>
<body>

<div class="browser-window">
  <div class="toolbar">
    <div class="traffic-lights">
      <div class="tl tl-red"></div>
      <div class="tl tl-yellow"></div>
      <div class="tl tl-green"></div>
    </div>
    <div class="toolbar-spacer"></div>
    <div class="address-bar">
      <span class="lock">🔒</span>
      <span class="url"><span class="domain">example-site.com</span></span>
    </div>
    <div class="toolbar-right">
      <div class="toolbar-icon ext-active"><img src="../icons/icon128_light.png" style="width:16px;height:16px;" alt=""></div>
      <div class="toolbar-icon">⭐</div>
      <div class="toolbar-icon">⋮</div>
    </div>
  </div>

  <div class="viewport">
    <div class="page-nav">
      <div class="page-logo-block"></div>
      <div class="page-nav-links">
        <div class="page-nav-link"></div>
        <div class="page-nav-link"></div>
        <div class="page-nav-link"></div>
      </div>
      <div class="page-nav-right">
        <div class="page-nav-btn"></div>
        <div class="page-nav-btn-cta"></div>
      </div>
    </div>

    <div class="page-hero">
      <div class="hero-text-area">
        <div class="hero-line-1"></div>
        <div class="hero-line-2"></div>
        <div class="hero-line-3"></div>
        <div class="hero-line-4"></div>
        <div class="hero-line-5"></div>
        <div class="hero-btn-row">
          <div class="hero-btn-block"></div>
          <div class="hero-btn-ghost"></div>
        </div>
      </div>
      <!-- Highlighted element with pink dashed outline -->
      <div class="hero-image-block">
        <div class="hero-image-inner"></div>
      </div>
      <!-- Floating label badge -->
      <div class="highlight-badge">BUI #01</div>
    </div>

    <div class="page-content">
      <div class="content-card">
        <div class="card-icon-block"></div>
        <div class="card-title-block"></div>
        <div class="card-text-block"></div>
        <div class="card-text-block short"></div>
        <div class="card-link-block"></div>
      </div>
      <div class="content-card">
        <div class="card-icon-block"></div>
        <div class="card-title-block"></div>
        <div class="card-text-block"></div>
        <div class="card-text-block short"></div>
        <div class="card-link-block"></div>
      </div>
      <div class="content-card">
        <div class="card-icon-block"></div>
        <div class="card-title-block"></div>
        <div class="card-text-block"></div>
        <div class="card-text-block short"></div>
        <div class="card-link-block"></div>
      </div>
      <div class="content-card">
        <div class="card-icon-block"></div>
        <div class="card-title-block"></div>
        <div class="card-text-block"></div>
        <div class="card-text-block short"></div>
        <div class="card-link-block"></div>
      </div>
    </div>

    <!-- Extension Popup -->
    <div class="popup-wrapper">
      <div class="popup">
        <div class="popup-header">
          <img class="popup-icon" src="../icons/icon128_light.png" alt="">
          <span class="popup-title">Broken UI Finder</span>
        </div>

        <div class="tab-nav">
          <div class="tab active">
            Layout
            <span class="tab-badge">5</span>
          </div>
          <div class="tab">
            A11y
            <span class="tab-badge">3</span>
          </div>
          <div class="tab">
            Struktur
            <span class="tab-badge">4</span>
          </div>
        </div>

        <!-- Overflow card with expanded item and active Highlight button -->
        <div class="check-card">
          <div class="card-header found">
            <span class="check-pill">Overflow</span>
            <span class="card-header-title">Overflow-Probleme</span>
            <span class="card-count">3 gefunden</span>
          </div>
          <div class="card-body">
            <div class="col-headers">
              <span class="col-label left">ELEMENT</span>
              <span class="col-label right">OVERFLOW</span>
            </div>

            <!-- Expanded item with active Highlight button -->
            <div class="expanded-wrap">
              <div class="expanded-header" style="justify-content:space-between;">
                <span>.hero-banner</span>
                <span style="font-weight:600;color:#1f2937;font-size:11px;">47px</span>
              </div>
              <div class="detail-rows">
                <div class="detail-row">
                  <span class="detail-label">Element</span>
                  <span class="detail-val">section.hero-banner</span>
                </div>
                <div class="detail-row">
                  <span class="detail-label">Scroll-Breite</span>
                  <span class="detail-val">1327px (Container 1280px)</span>
                </div>
              </div>
              <div class="action-btns">
                <div class="btn-highlight">Highlight</div>
                <div class="btn-copy">Copy</div>
              </div>
            </div>

            <div class="list-item">
              <span class="item-title">#sidebar-nav</span>
              <span class="item-value">23px</span>
            </div>
            <div class="list-item">
              <span class="item-title">.card-grid</span>
              <span class="item-value">11px</span>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

</body>
</html>
